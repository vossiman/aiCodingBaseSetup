# aiCodingBaseSetup — managed by install.sh. Do not edit directly; your
# edits will be classified as "drifted" by aicoding-sync.
#
# {{HOME}} / {{*_API_KEY}} placeholders are substituted at deploy time by
# lib/blueprint-deploy.sh's deploy_overwrite_file_substituted pipeline.

model = "gpt-5.5"

# Setting BOTH of these explicitly suppresses codex's per-project trust screen,
# so codex stops writing [projects."<path>"].trust_level into this file. That
# write is what made config.toml drift and get clobbered (with a .bak) on every
# `aicoding-sync`. Spike-verified: with both set, no trust_level is written.
#
# Automode (2026-07-14): the devpod container is the isolation boundary, so no
# prompts and no codex sandbox — same posture as claude's skip-permissions.
# Dial back to sandbox_mode = "workspace-write" for a write fence (then also
# set [sandbox_workspace_write] network_access = true or sandboxed commands
# lose network). Values — approval_policy: untrusted|on-request|never;
# sandbox_mode: read-only|workspace-write|danger-full-access.
#
# Secrets: codex's default shell_environment_policy strips env vars whose
# names contain KEY/SECRET/TOKEN from commands it runs. Keep that default
# (never set ignore_default_excludes = true). Side effect: `git push` from
# inside codex may fail because the gh credential helper reads GH_TOKEN from
# the (stripped) environment.
approval_policy = "never"
sandbox_mode = "danger-full-access"

[mcp_servers.firecrawl]
command = "firecrawl-mcp"
env = { FIRECRAWL_API_KEY = "{{FIRECRAWL_API_KEY}}" }

[mcp_servers.brave-search]
command = "brave-search-mcp-server"
env = { BRAVE_API_KEY = "{{BRAVE_API_KEY}}" }

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest", "--browser", "chromium"]
